<!DOCTYPE html>
<html lang="em">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="with=device-with, initial-scale=1.0">
        <title>Student Registraction Form</title>
    </head>
    
    <body>
        <!-- Header -->
        <header>
            <h1>Student Registraction From</h1>
        <form>
            <!-- Personal Information -->
             <fieldset>
                <legend>Personal Information</legend>
                <label>
                    Full Name:
                    <input type="=text" placeholder="Devil" required>
                </label>
               <br>
            <label for="email">Email:</label>
            <input id="email" type="text" placeholder="abc@example.com" required>
            <br>

            <label for="Password">Password:</label>
            <input id="Paasword" type="text" placeholder="*******" required>
            <br>
            
            <label for="number">Phone Number:</label>
            <input id="number" type="tel" placeholder="123-456-7890">
            <br>

            <label for="DOB">DOB:</label>
            <input id="DOB" type="date">

             </fieldset>
             <br>
             <fieldset>
                <legend> Gender Information</legend>
                <label for="Male">Male:</label>
                <input type="radio" name="gender" id="male">
                <br>

                <label for="Female">Female:</label>
                <input type="radio" name="gender" id="Female">
                <br>
             </fieldset>
              <br>
              <!-- Course Information -->
               <fieldset>
                <legend> Course Information</legend>
                <label for="Course"></label>Course:</label>
                <select name="" id="Course">
                    <option>MERN</option>
                    <option>CSS</option>
                    <option>JS</option>
                </select>
           
        </form>
    </header>
    </body>
</html>
