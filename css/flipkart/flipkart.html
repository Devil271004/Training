<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Clone</title>

    <link rel="stylesheet" href="style2.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <div class="header">

        <!-- Top Row -->
        <div class="top-row">

            <!-- Logo -->
            <div class="logo-box">
                <i class="fa-brands fa-flipboard"></i>
                <span>Flipkart</span>
            </div>

            <!-- Travel -->
            <div class="travel-box">
                <i class="fa-solid fa-plane"></i>
                <span>Travel</span>
            </div>

            <!-- Location -->
            <div class="location">
                <i class="fa-solid fa-location-dot"></i>
                <span>Location not set</span>

                <a href="#">Select delivery location</a>
            </div>

        </div>

        <!-- Bottom Row -->
        <div class="bottom-row">

            <!-- Search -->
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>

                <input type="text"
                placeholder="Search for Products, Brands and More">
            </div>

            <!-- Login -->
            <div class="menu">
                <i class="fa-regular fa-circle-user"></i>
                Login
            </div>

            <!-- More -->
            <div class="menu">
                More
            </div> 

            <!-- Cart -->
            <div class="menu">
                <i class="fa-solid fa-cart-shopping"></i>
                Cart
            </div>

        </div>

    </div>

    <!-- Banner -->
    <div class="banner">
        <img src="" width="390px"
        alt="">
    </div>

    <!-- Product Images -->
    <div class="products">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=500"
            alt="">
            <h2>Mobiles</h2>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500"
            alt="">
            <h2>Laptops</h2>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500"
            alt="">
            <h2>Headphones</h2>
        </div>

        <!-- New 4th Image -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500"
            alt="">
            <h2>Shoes</h2>
        </div>

    </div>

</body>
</html>
