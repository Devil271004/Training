<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>

    <link rel="stylesheet" href="youtube.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <div class="header">

        <div class="logo">
            <i class="fa-brands fa-youtube"></i>
            <span>YouTube</span>
        </div>

        <div class="search-box">
            <input type="text" placeholder="Search">

            <button>
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <div class="icons">
            <i class="fa-solid fa-video"></i>
            <i class="fa-regular fa-bell"></i>
            <i class="fa-solid fa-user"></i>
        </div>

    </div>

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="side-item">
            <i class="fa-solid fa-house"></i>
            <p>Home</p>
        </div>

        <div class="side-item">
            <i class="fa-solid fa-bolt"></i>
            <p>Shorts</p>
        </div>

        <div class="side-item">
            <i class="fa-solid fa-play"></i>
            <p>Subscriptions</p>
        </div>

        <div class="side-item">
            <i class="fa-solid fa-book"></i>
            <p>Library</p>
        </div>

    </div>

    <!-- Videos -->
    <div class="video-section">

        <div class="video-card">
            <img src="https://picsum.photos/300/180?1" alt="">
            <h3>HTML Full Course</h3>
            <p>CodeWithPrince</p>
            <span>1M views • 2 days ago</span>
        </div>

        <div class="video-card">
            <img src="https://picsum.photos/300/180?2" alt="">
            <h3>CSS Beginner Tutorial</h3>
            <p>Tech Channel</p>
            <span>850K views • 5 days ago</span>
        </div>

        <div class="video-card">
            <img src="https://picsum.photos/300/180?3" alt="">
            <h3>JavaScript Crash Course</h3>
            <p>Learn Coding</p>
            <span>500K views • 1 week ago</span>
        </div>

        <div class="video-card">
            <img src="https://picsum.photos/300/180?4" alt="">
            <h3>Web Development Roadmap</h3>
            <p>Developer Hub</p>
            <span>2M views • 3 days ago</span>
        </div>

    </div>

</body>
</html>
