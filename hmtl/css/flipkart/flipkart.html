<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Clone</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">

        <div class="logo">
            <h2>Flipkart</h2>
        </div>

        <div class="search-box">
            <input type="text" placeholder="Search for Products">
        </div>

        <div class="login">
            <button>Login</button>
        </div>

    </div>

    <!-- Categories -->
    <div class="categories">
        <div class="category">Mobiles</div>
        <div class="category">Fashion</div>
        <div class="category">Electronics</div>
        <div class="category">Home</div>
        <div class="category">Beauty</div>
        <div class="category">Appliances</div>
    </div>

    <!-- Products -->
    <div class="products">

        <div class="card">
            <img src="https://via.placeholder.com/180" alt="">
            <h3>Smart Phone</h3>
            <p>₹19,999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/180" alt="">
            <h3>Laptop</h3>
            <p>₹59,999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/180" alt="">
            <h3>Headphones</h3>
            <p>₹2,999</p>
            <button>Buy Now</button>
        </div>

    </div>

    <footer>
        @ 2024 Flipkart Clone. All rights reserved.
    </footer>

</body>
</html>
