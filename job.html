<!DOCTYPE html>
<html lang="em">
 <head>
    <meta charset="UTF-8">
    <meta name="viweport" content="width=device-width,initial-scale=1.0"
    <title>Job Application</title> 

 </head>   
 <body>
    <main>
    <header>
        <h1>Job Application</h1>
        <form>
            <fieldset>
                <legend>Personal Information</legend>
                <label >Full Name</label>
                <input type="text" placeholder="Devil" required>
                <br>
                <br>
             <label for="email">Email:</label>
            <input id="email" type="text" placeholder="abc@example.com" required>
            <br>
            <br>
            <label for="number">Phone Number:</label>
            <input id="number" type="tel" placeholder="123-456-7890">
            <br>
            <br>
             <label for="DOB">DOB:</label>
            <input id="DOB" type="date">
            <br>
            <br>
            
            </fieldset>
            <br>
             <fieldset>
                <legend> Gender Information</legend>
                <input type="radio" name="gender" id="male">
                <label for="Male">Male:</label>
               <br>
                
                <br>
<input type="radio" name="gender" id="Female">
                <label for="Female">Female:</label>

                
                <br>
                <br>
                <input type="radio" name="gender" id="Female">
                 <label for="Other">Other:</label>
                 <br>
                 <br>
               
              
             </fieldset>
<br>
             <fieldset>
                <!-- Skills -->
                 <legend>Skills</legend>
                 <input type="checkbox" id="MERN">
                 <label for="MERN">MERN:</label>
                 <br>
                 
                 <input type="checkbox" id="AI Developer">
                 <label for="AI Developer">AI Developer:</label>
                 <br>
                 <input type="checkbox" id="Data">
                 
                 <label for="Data">Data Analyst</label>
                 <br>
                 <input type="checkbox" id="Data">
                 
                 <label for="Data">Cloud Engineer</label>

                 
             </fieldset>
             <br>
             <fieldset>
                <!-- Additional Information -->
                 <legend>Additional Information</legend>
                 <!-- Experience -->
                  <label for="Experience">Years of Experience</label>
                  <select id="Experience">
                    <option disabled selected>Select Year</option>
                    <option>Freshers</option>
                    <option>1 Year</option>
                    <option>2 Year</option>
                    <option>3+ Experience</option>
                  </select>
                  <br>
                  

                  <!-- Upload Resume -->
                   <legend>Upload Resume</legend>
                   <input type="file">
</fieldset>
<br>
<br>
                  <fieldset>
                    <legend>Perfred Location</legend>
                  
                  <!-- Location -->
                <select name="" id="">
                     <option disabled selected>Select Location</option>
                    <option value="VD">Vadodara</option>
                    <option value="IN">Indore</option>
                     <option value="BH">Bihar</option>

                </select>
             </fieldset>
             <br>
             
             <!-- Submit Button -->
              <button type="submit">Submit</button>
              <button type="reset">Reset</button>
        </form>
    </header>
 </body>
 </main>
</html>
